<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vaytoven — App Prototype</title>
<meta name="description" content="Interactive prototype of the Vaytoven Rentals app." />

<style>
:root {
  --brand-pink: #FF3D8A;
  --brand-magenta: #D63384;
  --brand-purple: #7B2CBF;
  --brand-deep: #3D1862;
  --gradient-brand: linear-gradient(135deg, #FF3D8A 0%, #D63384 38%, #7B2CBF 100%);
  --gradient-deep: linear-gradient(160deg, #3D1862 0%, #1A0C2E 100%);

  --ink: #1A1426;
  --ink-soft: #423853;
  --ink-mute: #8E879B;
  --ink-faint: #C9C3D6;
  --paper: #FBF8F3;
  --paper-2: #F4EFE6;
  --paper-3: #E8DFD0;
  --line: rgba(26, 20, 38, 0.08);
  --line-strong: rgba(26, 20, 38, 0.16);

  --shadow-sm: 0 1px 2px rgba(26,20,38,.05), 0 4px 12px -2px rgba(26,20,38,.06);
  --shadow-md: 0 1px 2px rgba(26,20,38,.06), 0 12px 32px -8px rgba(26,20,38,.14);
  --shadow-lg: 0 30px 60px -20px rgba(123, 44, 191, 0.35);

  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 22px;
  --radius-pill: 999px;
}

* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
body {
  font-family: "Geist", system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }

::selection { background: var(--brand-pink); color: white; }

h1, h2, h3, h4 {
  font-family: "Fraunces", serif;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0;
  font-variation-settings: "opsz" 144;
}
.italic-accent { font-style: italic; }
.gradient-text {
  background: var(--gradient-brand);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

/* ───────── App shell ───────── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: rgba(251, 248, 243, 0.92);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0.85rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.topbar .brand {
  display: flex; align-items: center; gap: 0.55rem;
  font-family: "Fraunces", serif;
  font-size: 1.35rem;
  letter-spacing: -0.03em;
  cursor: pointer;
}
.brand-mark { width: 28px; height: 28px; flex: none; }
.topbar-search {
  flex: 1;
  max-width: 600px;
  display: flex;
  align-items: center;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  padding: 0.4rem 0.5rem 0.4rem 1.1rem;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow 200ms;
}
.topbar-search:hover { box-shadow: var(--shadow-md); }
.topbar-search-text {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 0.5rem;
}
.topbar-search-text .sep { width: 1px; height: 16px; background: var(--line); display: inline-block; }
.topbar-search-text .muted { color: var(--ink-mute); font-weight: 400; }
.topbar-search-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient-brand);
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex: none;
}
.topbar-actions { display: flex; align-items: center; gap: 0.35rem; }
.topbar-mode-toggle {
  display: flex;
  background: var(--paper-2);
  border-radius: var(--radius-pill);
  padding: 3px;
  font-size: 0.82rem;
  font-weight: 500;
  margin-right: 0.4rem;
}
.topbar-mode-toggle button {
  padding: 0.45rem 0.95rem;
  border-radius: var(--radius-pill);
  color: var(--ink-soft);
  transition: background 160ms, color 160ms;
}
.topbar-mode-toggle button.active {
  background: white;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 160ms;
  position: relative;
}
.icon-btn:hover { background: var(--paper-2); }
.icon-btn .badge {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--brand-pink);
  border: 2px solid var(--paper);
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient-brand);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
  font-family: "Fraunces", serif;
  font-size: 0.92rem;
  cursor: pointer;
}

/* Mobile topbar */
@media (max-width: 720px) {
  .topbar { padding: 0.7rem 1rem; gap: 0.6rem; }
  .topbar-search-text { font-size: 0.82rem; }
  .topbar-search-text .sep, .topbar-search-text .muted:nth-of-type(2) { display: none; }
  .topbar-mode-toggle { display: none; }
  .topbar .brand span { display: none; }
}

/* ───────── Main ───────── */
.main { flex: 1; }
.page { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
.page-wide { max-width: none; }

/* ───────── Search results page ───────── */
.results-layout {
  display: grid;
  grid-template-columns: 280px 1fr 420px;
  gap: 1.25rem;
  align-items: start;
}
@media (max-width: 1100px) { .results-layout { grid-template-columns: 240px 1fr; } .results-map { display: none; } }
@media (max-width: 720px) { .results-layout { grid-template-columns: 1fr; } .results-filters { display: none; } }

.results-filters {
  position: sticky;
  top: 80px;
  background: white;
  border-radius: var(--radius);
  padding: 1.25rem;
  border: 1px solid var(--line);
}
.filter-group { padding: 1rem 0; border-bottom: 1px solid var(--line); }
.filter-group:first-child { padding-top: 0; }
.filter-group:last-child { border-bottom: none; padding-bottom: 0; }
.filter-group h4 {
  font-family: "Geist", sans-serif;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  font-weight: 500;
  margin-bottom: 0.85rem;
}
.range-display {
  display: flex; justify-content: space-between;
  font-size: 0.92rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
}
.range-display .muted { color: var(--ink-mute); font-weight: 400; }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: var(--paper-3);
  border-radius: 999px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  cursor: grab;
  box-shadow: 0 0 0 4px rgba(255, 61, 138, 0.5);
}
input[type=range]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: white; cursor: grab; border: none;
  box-shadow: 0 0 0 4px rgba(255, 61, 138, 0.5);
}

.chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.chip {
  padding: 0.4rem 0.85rem;
  border-radius: var(--radius-pill);
  font-size: 0.82rem;
  background: var(--paper-2);
  border: 1px solid transparent;
  transition: all 160ms;
  font-weight: 500;
  color: var(--ink-soft);
}
.chip:hover { border-color: var(--line-strong); }
.chip.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

.toggle {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.92rem;
}
.switch {
  width: 36px; height: 20px;
  background: var(--paper-3);
  border-radius: 999px;
  position: relative;
  transition: background 160ms;
  flex: none;
}
.switch::after {
  content: ""; position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: white;
  border-radius: 50%;
  transition: left 200ms cubic-bezier(.4,0,.2,1);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.switch.on { background: var(--brand-pink); }
.switch.on::after { left: 18px; }

/* Results list */
.results-list { display: flex; flex-direction: column; gap: 1rem; }
.results-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 0.75rem;
}
.results-header h1 { font-size: 1.65rem; font-family: "Fraunces", serif; }
.results-header .sub { font-size: 0.88rem; color: var(--ink-mute); }
.results-header select {
  padding: 0.45rem 0.85rem;
  border-radius: var(--radius-pill);
  border: 1px solid var(--line);
  background: white;
  font-size: 0.85rem;
  cursor: pointer;
}

.list-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  overflow: hidden;
  display: grid;
  grid-template-columns: 280px 1fr;
  cursor: pointer;
  transition: border-color 200ms, transform 200ms;
}
.list-card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
.list-card.highlighted { border-color: var(--brand-pink); box-shadow: 0 0 0 2px rgba(255, 61, 138, 0.15); }
.list-card-img {
  position: relative;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
  overflow: hidden;
}
.list-card-img .placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: "Fraunces", serif;
  font-size: 1.5rem;
  color: rgba(26, 20, 38, 0.18);
  font-style: italic;
}
.list-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.list-card .heart {
  position: absolute; top: 0.75rem; right: 0.75rem;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.list-card .heart svg { width: 16px; height: 16px; stroke: var(--ink); fill: none; stroke-width: 2; }
.list-card .heart.active svg { fill: var(--brand-pink); stroke: var(--brand-pink); }
.list-card .badge {
  position: absolute; top: 0.75rem; left: 0.75rem;
  background: rgba(255,255,255,0.95);
  font-size: 0.72rem;
  padding: 0.3rem 0.65rem;
  border-radius: var(--radius-pill);
  font-weight: 500;
}
.list-card-body {
  padding: 1.1rem 1.25rem;
  display: flex; flex-direction: column;
  gap: 0.4rem;
}
.list-card-body .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
.list-card-body .loc { font-size: 0.82rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.list-card-body .rating { font-size: 0.85rem; display: flex; align-items: center; gap: 0.2rem; }
.list-card-body .rating svg { width: 12px; height: 12px; fill: var(--ink); }
.list-card-body .title { font-family: "Fraunces", serif; font-size: 1.2rem; letter-spacing: -0.01em; }
.list-card-body .meta { font-size: 0.85rem; color: var(--ink-soft); }
.list-card-body .price-row {
  margin-top: auto;
  padding-top: 0.75rem;
  display: flex; justify-content: space-between; align-items: baseline;
}
.list-card-body .price { font-size: 1.05rem; font-weight: 600; }
.list-card-body .per { color: var(--ink-mute); font-weight: 400; font-size: 0.85rem; }

@media (max-width: 720px) {
  .list-card { grid-template-columns: 1fr; }
  .list-card-img { aspect-ratio: 16/10; }
}

/* Map panel (faux map made of CSS) */
.results-map {
  position: sticky; top: 80px;
  height: calc(100vh - 100px);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, #E8E2D2 0%, #DDD3BF 100%);
}
.map-canvas {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(123, 44, 191, 0.06), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(255, 61, 138, 0.06), transparent 60%);
}
.map-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(26, 20, 38, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26, 20, 38, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.map-roads {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.5;
}
.map-pin {
  position: absolute;
  background: white;
  border: 1px solid var(--line);
  padding: 0.35rem 0.7rem;
  border-radius: var(--radius-pill);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  transition: all 200ms;
  box-shadow: var(--shadow-sm);
  z-index: 1;
}
.map-pin:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 2; }
.map-pin.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
  z-index: 3;
  transform: translate(-50%, -50%) scale(1.1);
}
.map-watermark {
  position: absolute;
  bottom: 8px; right: 8px;
  font-size: 0.7rem;
  color: rgba(26, 20, 38, 0.4);
  font-style: italic;
}

/* ───────── Listing detail page ───────── */
.detail-back {
  display: flex; align-items: center; gap: 0.45rem;
  font-size: 0.88rem;
  color: var(--ink-soft);
  margin-bottom: 1rem;
  cursor: pointer;
  font-weight: 500;
}
.detail-back:hover { color: var(--ink); }
.detail-back svg { width: 16px; height: 16px; }

.detail-header { margin-bottom: 1.25rem; }
.detail-header h1 { font-size: clamp(1.8rem, 3vw, 2.6rem); margin-bottom: 0.4rem; }
.detail-header .meta {
  display: flex; align-items: center; gap: 0.85rem;
  font-size: 0.92rem;
  color: var(--ink-soft);
  flex-wrap: wrap;
}
.detail-header .meta .dot { color: var(--ink-faint); }
.detail-header .meta strong { font-weight: 500; color: var(--ink); }

.detail-gallery {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0.5rem;
  height: 460px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 2rem;
}
.detail-gallery > div {
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
  position: relative;
}
.detail-gallery > div:nth-child(1) { grid-row: 1 / 3; }
.gallery-tile {
  display: flex; align-items: center; justify-content: center;
  font-family: "Fraunces", serif;
  font-style: italic;
  color: rgba(26, 20, 38, 0.18);
  font-size: 1.2rem;
}
.gallery-tile.tinted-1 { background: linear-gradient(135deg, #FFE0EC, #F4DAEC); }
.gallery-tile.tinted-2 { background: linear-gradient(135deg, #E0E5FF, #DAEAEC); }
.gallery-tile.tinted-3 { background: linear-gradient(135deg, #FFF4E0, #F4ECD0); }
.gallery-tile.tinted-4 { background: linear-gradient(135deg, #E8E0FF, #D8D0EC); }
.gallery-tile.tinted-5 { background: linear-gradient(135deg, #FFE8E0, #F4D6CC); }

@media (max-width: 720px) {
  .detail-gallery { grid-template-columns: 1fr; grid-template-rows: 250px; height: auto; }
  .detail-gallery > div:nth-child(n+2) { display: none; }
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 3rem;
  align-items: start;
}
@media (max-width: 980px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-section {
  padding: 1.75rem 0;
  border-bottom: 1px solid var(--line);
}
.detail-section:first-child { padding-top: 0; }
.detail-section h2 {
  font-size: 1.4rem;
  margin-bottom: 1rem;
}
.host-row {
  display: flex; align-items: center; gap: 1rem;
}
.host-row .avatar { width: 56px; height: 56px; font-size: 1.3rem; }
.host-row .role { color: var(--ink-mute); font-size: 0.88rem; }

.amenity-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.85rem;
}
.amenity {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0;
  font-size: 0.95rem;
}
.amenity svg { width: 18px; height: 18px; flex: none; color: var(--ink-soft); }

/* Booking sidebar */
.book-card {
  position: sticky; top: 80px;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
}
.book-card .price-row { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 1rem; }
.book-card .price-row .price { font-size: 1.6rem; font-weight: 600; }
.book-card .price-row .per { color: var(--ink-mute); font-size: 0.92rem; }
.book-card .price-row .rating {
  margin-left: auto;
  display: flex; align-items: center; gap: 0.25rem;
  font-size: 0.88rem;
}
.book-card .price-row .rating svg { width: 12px; height: 12px; fill: var(--ink); }

.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 0.5rem;
  overflow: hidden;
}
.date-input {
  padding: 0.7rem 0.95rem;
  border: none;
  outline: none;
  background: transparent;
  font-size: 0.85rem;
}
.date-input + .date-input { border-left: 1px solid var(--line); }
.date-input label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.15rem;
}
.guests-input {
  width: 100%;
  padding: 0.7rem 0.95rem;
  border: 1px solid var(--line);
  border-radius: 12px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  background: white;
  cursor: pointer;
}
.guests-input label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.15rem;
}
.btn-primary {
  width: 100%;
  padding: 0.95rem;
  background: var(--gradient-brand);
  color: white;
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.95rem;
  transition: transform 180ms, box-shadow 180ms;
  box-shadow: 0 6px 18px -4px rgba(214, 51, 132, 0.45);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 26px -6px rgba(214, 51, 132, 0.6); }
.btn-secondary {
  width: 100%;
  padding: 0.95rem;
  background: white;
  border: 1px solid var(--line);
  color: var(--ink);
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.95rem;
  transition: border-color 180ms;
}
.btn-secondary:hover { border-color: var(--ink); }

.cost-row {
  display: flex; justify-content: space-between;
  font-size: 0.9rem;
  padding: 0.4rem 0;
  color: var(--ink-soft);
}
.cost-row.total {
  border-top: 1px solid var(--line);
  margin-top: 0.5rem;
  padding-top: 0.85rem;
  font-weight: 600;
  font-size: 1rem;
  color: var(--ink);
}
.cost-row .underline { text-decoration: underline; cursor: help; }

/* ───────── Modal ───────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26, 20, 38, 0.5);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  animation: fadeIn 200ms ease;
}
.modal {
  background: var(--paper);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp 280ms cubic-bezier(.2,.8,.2,1);
}
.modal-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 1.4rem; }
.modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--paper-2); }
.modal-body {
  padding: 1.5rem;
  overflow-y: auto;
  flex: 1;
}
.modal-footer {
  padding: 1.25rem 1.5rem;
  border-top: 1px solid var(--line);
  display: flex; gap: 0.75rem;
}

/* ───────── Members program (vacation properties) ───────── */
.members-banner {
  background: linear-gradient(135deg, rgba(255, 61, 138, 0.08) 0%, rgba(123, 44, 191, 0.08) 100%);
  border: 1px solid rgba(214, 51, 132, 0.18);
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
  cursor: pointer;
  transition: border-color 160ms ease, transform 160ms ease;
}
.members-banner:hover { border-color: var(--brand-magenta); transform: translateY(-1px); }
.members-banner-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--gradient-brand);
  display: flex; align-items: center; justify-content: center;
  flex: none;
  color: white;
}
.members-banner-text { flex: 1; min-width: 0; }
.members-banner-text strong {
  display: block;
  font-size: 0.92rem;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.members-banner-text span {
  font-size: 0.82rem;
  color: var(--ink-mute);
}
.members-banner-arrow {
  color: var(--brand-magenta);
  flex: none;
}
@media (max-width: 600px) {
  .members-banner-text strong { font-size: 0.88rem; }
  .members-banner-text span { display: none; }
}

/* Members modal form fields */
.mform { display: flex; flex-direction: column; gap: 0.85rem; }
.mform-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.85rem;
}
@media (max-width: 540px) { .mform-row { grid-template-columns: 1fr; } }
.mfield { display: flex; flex-direction: column; gap: 0.35rem; }
.mfield label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink);
}
.mfield label .req { color: var(--brand-magenta); }
.mfield input,
.mfield select,
.mfield textarea {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 0.65rem 0.8rem;
  font-size: 0.92rem;
  background: white;
  color: var(--ink);
  outline: none;
  font-family: inherit;
  transition: border-color 160ms, box-shadow 160ms;
}
.mfield input:focus,
.mfield select:focus,
.mfield textarea:focus {
  border-color: var(--brand-magenta);
  box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.12);
}
.mfield textarea { resize: vertical; min-height: 70px; }
.mfield .hint { font-size: 0.74rem; color: var(--ink-mute); }
.mcheckbox {
  display: flex;
  gap: 0.55rem;
  align-items: start;
  font-size: 0.82rem;
  color: var(--ink-soft);
  line-height: 1.45;
  cursor: pointer;
}
.mcheckbox input { margin-top: 3px; accent-color: var(--brand-magenta); flex: none; }
.mform-error {
  background: rgba(214, 51, 132, 0.08);
  border: 1px solid rgba(214, 51, 132, 0.25);
  color: var(--brand-magenta);
  padding: 0.6rem 0.85rem;
  border-radius: 10px;
  font-size: 0.85rem;
}
.members-success {
  padding: 2rem 1.5rem 2.5rem;
  text-align: center;
}
.members-success .check {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--gradient-brand);
  margin: 0 auto 1rem;
  display: flex; align-items: center; justify-content: center;
  color: white;
}
.members-success h3 {
  font-family: "Fraunces", serif;
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.members-success p {
  color: var(--ink-soft);
  font-size: 0.92rem;
  max-width: 32ch;
  margin: 0 auto;
  line-height: 1.5;
}

/* Members tab in host sidebar (added as a sixth tab) */

/* ───────── Booking confirmation ───────── */
.confirm-hero {
  background: var(--gradient-deep);
  color: white;
  padding: 4rem 2rem;
  border-radius: var(--radius-lg);
  text-align: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 2rem;
}
.confirm-hero::before {
  content: "";
  position: absolute; inset: -10%;
  background:
    radial-gradient(circle at 70% 30%, rgba(255, 61, 138, 0.3), transparent 50%),
    radial-gradient(circle at 30% 70%, rgba(123, 44, 191, 0.4), transparent 50%);
}
.confirm-hero > * { position: relative; z-index: 1; }
.confirm-check {
  width: 72px; height: 72px;
  margin: 0 auto 1.5rem;
  background: rgba(255, 255, 255, 0.16);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(255, 255, 255, 0.3);
}
.confirm-check svg { width: 36px; height: 36px; stroke: white; stroke-width: 2.5; }
.confirm-hero h1 { font-size: 2.4rem; margin-bottom: 0.5rem; }
.confirm-hero p { color: rgba(255, 255, 255, 0.75); max-width: 32ch; margin: 0 auto; }
.confirm-code {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 0.45rem 1rem;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: var(--radius-pill);
  font-size: 0.85rem;
  letter-spacing: 0.04em;
  font-feature-settings: "tnum";
}

.confirm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  background: white;
  padding: 2rem;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
}
@media (max-width: 720px) { .confirm-grid { grid-template-columns: 1fr; } }
.confirm-block h3 {
  font-family: "Geist", sans-serif;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  font-weight: 500;
  margin-bottom: 0.6rem;
}
.confirm-block p {
  font-size: 1rem;
  margin-bottom: 0.2rem;
}

/* ───────── Trips page ───────── */
.trips-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 1.5rem;
}
.trips-tab {
  padding: 0.85rem 0;
  margin-right: 1.75rem;
  font-weight: 500;
  font-size: 0.95rem;
  color: var(--ink-mute);
  border-bottom: 2px solid transparent;
  transition: color 160ms, border-color 160ms;
}
.trips-tab.active {
  color: var(--ink);
  border-bottom-color: var(--brand-pink);
}

.trip-row {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  align-items: center;
  gap: 1.25rem;
  padding: 1.25rem;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 0.85rem;
  cursor: pointer;
  transition: border-color 180ms;
}
.trip-row:hover { border-color: var(--line-strong); }
.trip-thumb {
  width: 100px; height: 100px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
  flex: none;
}
.trip-info .loc { font-size: 0.78rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.trip-info .title { font-family: "Fraunces", serif; font-size: 1.2rem; margin: 0.15rem 0 0.35rem; }
.trip-info .dates { font-size: 0.88rem; color: var(--ink-soft); }
.trip-status {
  font-size: 0.78rem;
  padding: 0.3rem 0.7rem;
  border-radius: var(--radius-pill);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.trip-status.confirmed { background: #E8F5EE; color: #1F7A4D; }
.trip-status.upcoming { background: #FCF0F6; color: var(--brand-magenta); }
.trip-status.completed { background: var(--paper-2); color: var(--ink-soft); }

@media (max-width: 720px) {
  .trip-row { grid-template-columns: 80px 1fr; }
  .trip-thumb { width: 80px; height: 80px; }
  .trip-status { grid-column: 1 / -1; justify-self: start; margin-top: 0.4rem; }
}

/* ───────── Inbox page ───────── */
.inbox-layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  height: calc(100vh - 90px);
  background: white;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  overflow: hidden;
}
@media (max-width: 880px) { .inbox-layout { grid-template-columns: 1fr; } .inbox-thread.hide-mobile { display: none; } }

.inbox-list {
  border-right: 1px solid var(--line);
  overflow-y: auto;
}
.inbox-list-header {
  padding: 1.25rem;
  border-bottom: 1px solid var(--line);
  font-family: "Fraunces", serif;
  font-size: 1.5rem;
}
.inbox-item {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--line);
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 0.85rem;
  cursor: pointer;
  transition: background 160ms;
}
.inbox-item:hover { background: var(--paper); }
.inbox-item.active { background: var(--paper-2); }
.inbox-item .avatar { width: 44px; height: 44px; font-size: 1.05rem; }
.inbox-item .info { min-width: 0; }
.inbox-item .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
.inbox-item .name { font-weight: 500; font-size: 0.95rem; }
.inbox-item .time { font-size: 0.75rem; color: var(--ink-mute); flex: none; }
.inbox-item .preview {
  font-size: 0.85rem;
  color: var(--ink-soft);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 0.15rem;
}
.inbox-item.unread .name { font-weight: 600; }
.inbox-item.unread .preview { color: var(--ink); font-weight: 500; }
.inbox-item.unread::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--brand-pink);
  position: absolute;
  margin-left: -16px;
  margin-top: 18px;
}

.inbox-thread {
  display: flex;
  flex-direction: column;
}
.inbox-thread-header {
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 1rem;
}
.inbox-thread-header .info .name { font-weight: 500; }
.inbox-thread-header .info .stay { font-size: 0.82rem; color: var(--ink-mute); margin-top: 0.1rem; }

.thread-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex; flex-direction: column;
  gap: 0.75rem;
}
.msg {
  max-width: 70%;
  padding: 0.65rem 0.95rem;
  border-radius: 16px;
  font-size: 0.92rem;
  line-height: 1.4;
}
.msg.them {
  background: var(--paper-2);
  border-bottom-left-radius: 6px;
  align-self: flex-start;
}
.msg.me {
  background: var(--gradient-brand);
  color: white;
  border-bottom-right-radius: 6px;
  align-self: flex-end;
}
.msg-time {
  font-size: 0.72rem;
  color: var(--ink-mute);
  margin-top: 0.1rem;
}
.msg.me + .msg-time { align-self: flex-end; }

.thread-composer {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--line);
  display: flex; gap: 0.5rem;
  align-items: end;
}
.thread-composer textarea {
  flex: 1;
  resize: none;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 0.7rem 0.95rem;
  font-size: 0.92rem;
  outline: none;
  transition: border-color 160ms;
  min-height: 42px;
  max-height: 120px;
}
.thread-composer textarea:focus { border-color: var(--brand-pink); }
.thread-composer button {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--gradient-brand);
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex: none;
}
.thread-composer button:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state {
  padding: 4rem 2rem;
  text-align: center;
  color: var(--ink-mute);
  display: flex; flex-direction: column; align-items: center;
  gap: 0.5rem;
}
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; }

/* ───────── Host dashboard ───────── */
.host-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
}
.host-tabs button {
  padding: 0.85rem 0;
  margin-right: 1.75rem;
  font-weight: 500;
  font-size: 0.95rem;
  color: var(--ink-mute);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.host-tabs button.active {
  color: var(--ink);
  border-bottom-color: var(--brand-pink);
}

.host-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}
.host-stat {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.host-stat .label {
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  font-weight: 500;
}
.host-stat .value {
  font-family: "Fraunces", serif;
  font-size: 2rem;
  margin-top: 0.5rem;
  letter-spacing: -0.02em;
}
.host-stat .delta {
  font-size: 0.82rem;
  margin-top: 0.35rem;
}
.host-stat .delta.up { color: #1F7A4D; }
.host-stat .delta.down { color: #C41E3A; }

.host-listings {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.host-listings-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.host-listings-header h2 { font-size: 1.3rem; }

.host-listing {
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid var(--line);
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 1rem;
  align-items: center;
}
.host-listing:last-child { border-bottom: none; }
.host-listing-thumb {
  width: 60px; height: 60px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
}
.host-listing .title { font-weight: 500; }
.host-listing .sub { font-size: 0.85rem; color: var(--ink-mute); margin-top: 0.15rem; }
.host-listing .actions { display: flex; gap: 0.4rem; }
.host-listing .actions button {
  padding: 0.45rem 0.85rem;
  font-size: 0.82rem;
  border-radius: var(--radius-pill);
  background: var(--paper-2);
  font-weight: 500;
  transition: background 160ms;
}
.host-listing .actions button:hover { background: var(--paper-3); }
.host-listing .status-pill {
  font-size: 0.74rem;
  padding: 0.25rem 0.6rem;
  border-radius: var(--radius-pill);
  font-weight: 500;
  margin-left: 0.5rem;
}
.host-listing .status-pill.active { background: #E8F5EE; color: #1F7A4D; }
.host-listing .status-pill.pending { background: #FCF0F6; color: var(--brand-magenta); }

/* ───────── Animations ───────── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 0.85rem 1.5rem;
  border-radius: var(--radius-pill);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  display: flex; align-items: center; gap: 0.55rem;
  animation: slideUp 240ms cubic-bezier(.2,.8,.2,1);
}
.toast svg { width: 16px; height: 16px; }
.toast.success svg { color: #6FE2A0; }
</style>
