<meta name="description" content="Interactive prototype of the Vaytoven Rentals app." />

<style>
:root {
  --brand-pink: #FF3D8A;
  --brand-magenta: #D63384;
  --brand-purple: #7B2CBF;
  --brand-deep: #3D1862;
  --gradient-brand: linear-gradient(135deg, #FF3D8A 0%, #D63384 38%, #7B2CBF 100%);
  --gradient-deep: linear-gradient(160deg, #3D1862 0%, #1A0C2E 100%);

  --ink: #1A1426;
  --ink-soft: #423853;
  --ink-mute: #8E879B;
  --ink-faint: #C9C3D6;
  --paper: #FBF8F3;
  --paper-2: #F4EFE6;
  --paper-3: #E8DFD0;
  --line: rgba(26, 20, 38, 0.08);
  --line-strong: rgba(26, 20, 38, 0.16);

  --shadow-sm: 0 1px 2px rgba(26,20,38,.05), 0 4px 12px -2px rgba(26,20,38,.06);
  --shadow-md: 0 1px 2px rgba(26,20,38,.06), 0 12px 32px -8px rgba(26,20,38,.14);
  --shadow-lg: 0 30px 60px -20px rgba(123, 44, 191, 0.35);

  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 22px;
  --radius-pill: 999px;
}

* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
body {
  font-family: "Geist", system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }

::selection { background: var(--brand-pink); color: white; }

h1, h2, h3, h4 {
  font-family: "Fraunces", serif;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0;
  font-variation-settings: "opsz" 144;
}
.italic-accent { font-style: italic; }
.gradient-text {
  background: var(--gradient-brand);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

/* ───────── App shell ───────── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: rgba(251, 248, 243, 0.92);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0.85rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.topbar .brand {
  display: flex; align-items: center; gap: 0.55rem;
  font-family: "Fraunces", serif;
  font-size: 1.35rem;
  letter-spacing: -0.03em;
  cursor: pointer;
}
.brand-mark { width: 28px; height: 28px; flex: none; }
.topbar-search {
  flex: 1;
  max-width: 600px;
  display: flex;
  align-items: center;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  padding: 0.4rem 0.5rem 0.4rem 1.1rem;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow 200ms;
}
.topbar-search:hover { box-shadow: var(--shadow-md); }
.topbar-search-text {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 0.5rem;
}
.topbar-search-text .sep { width: 1px; height: 16px; background: var(--line); display: inline-block; }
.topbar-search-text .muted { color: var(--ink-mute); font-weight: 400; }
.topbar-search-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient-brand);
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex: none;
}
.topbar-actions { display: flex; align-items: center; gap: 0.35rem; }
.topbar-mode-toggle {
  display: flex;
  background: var(--paper-2);
  border-radius: var(--radius-pill);
  padding: 3px;
  font-size: 0.82rem;
  font-weight: 500;
  margin-right: 0.4rem;
}
.topbar-mode-toggle button {
  padding: 0.45rem 0.95rem;
  border-radius: var(--radius-pill);
  color: var(--ink-soft);
  transition: background 160ms, color 160ms;
}
.topbar-mode-toggle button.active {
  background: white;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 160ms;
  position: relative;
}
.icon-btn:hover { background: var(--paper-2); }
.icon-btn .badge {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--brand-pink);
  border: 2px solid var(--paper);
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient-brand);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
  font-family: "Fraunces", serif;
  font-size: 0.92rem;
  cursor: pointer;
}

/* Mobile topbar */
@media (max-width: 720px) {
  .topbar { padding: 0.7rem 1rem; gap: 0.6rem; }
  .topbar-search-text { font-size: 0.82rem; }
  .topbar-search-text .sep, .topbar-search-text .muted:nth-of-type(2) { display: none; }
  .topbar-mode-toggle { display: none; }
  .topbar .brand span { display: none; }
}

/* ───────── Main ───────── */
.main { flex: 1; }
.page { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
.page-wide { max-width: none; }

/* ───────── Search results page ───────── */
.results-layout {
  display: grid;
  grid-template-columns: 280px 1fr 420px;
  gap: 1.25rem;
  align-items: start;
}
@media (max-width: 1100px) { .results-layout { grid-template-columns: 240px 1fr; } .results-map { display: none; } }
@media (max-width: 720px) { .results-layout { grid-template-columns: 1fr; } .results-filters { display: none; } }

.results-filters {
  position: sticky;
  top: 80px;
  background: white;
  border-radius: var(--radius);
  padding: 1.25rem;
  border: 1px solid var(--line);
}
.filter-group { padding: 1rem 0; border-bottom: 1px solid var(--line); }
.filter-group:first-child { padding-top: 0; }
.filter-group:last-child { border-bottom: none; padding-bottom: 0; }
.filter-group h4 {
  font-family: "Geist", sans-serif;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  font-weight: 500;
  margin-bottom: 0.85rem;
}
.range-display {
  display: flex; justify-content: space-between;
  font-size: 0.92rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
}
.range-display .muted { color: var(--ink-mute); font-weight: 400; }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: var(--paper-3);
  border-radius: 999px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  cursor: grab;
  box-shadow: 0 0 0 4px rgba(255, 61, 138, 0.5);
}
input[type=range]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: white; cursor: grab; border: none;
  box-shadow: 0 0 0 4px rgba(255, 61, 138, 0.5);
}

.chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.chip {
  padding: 0.4rem 0.85rem;
  border-radius: var(--radius-pill);
  font-size: 0.82rem;
  background: var(--paper-2);
  border: 1px solid transparent;
  transition: all 160ms;
  font-weight: 500;
  color: var(--ink-soft);
}
.chip:hover { border-color: var(--line-strong); }
.chip.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

.toggle {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.92rem;
}
.switch {
  width: 36px; height: 20px;
  background: var(--paper-3);
  border-radius: 999px;
  position: relative;
  transition: background 160ms;
  flex: none;
}
.switch::after {
  content: ""; position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: white;
  border-radius: 50%;
  transition: left 200ms cubic-bezier(.4,0,.2,1);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.switch.on { background: var(--brand-pink); }
.switch.on::after { left: 18px; }

/* Results list */
.results-list { display: flex; flex-direction: column; gap: 1rem; }
.results-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 0.75rem;
}
.results-header h1 { font-size: 1.65rem; font-family: "Fraunces", serif; }
.results-header .sub { font-size: 0.88rem; color: var(--ink-mute); }
.results-header select {
  padding: 0.45rem 0.85rem;
  border-radius: var(--radius-pill);
  border: 1px solid var(--line);
  background: white;
  font-size: 0.85rem;
  cursor: pointer;
}

.list-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  overflow: hidden;
  display: grid;
  grid-template-columns: 280px 1fr;
  cursor: pointer;
  transition: border-color 200ms, transform 200ms;
}
.list-card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
.list-card.highlighted { border-color: var(--brand-pink); box-shadow: 0 0 0 2px rgba(255, 61, 138, 0.15); }
.list-card-img {
  position: relative;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
  overflow: hidden;
}
.list-card-img .placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: "Fraunces", serif;
  font-size: 1.5rem;
  color: rgba(26, 20, 38, 0.18);
  font-style: italic;
}
.list-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.list-card .heart {
  position: absolute; top: 0.75rem; right: 0.75rem;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.list-card .heart svg { width: 16px; height: 16px; stroke: var(--ink); fill: none; stroke-width: 2; }
.list-card .heart.active svg { fill: var(--brand-pink); stroke: var(--brand-pink); }
.list-card .badge {
  position: absolute; top: 0.75rem; left: 0.75rem;
  background: rgba(255,255,255,0.95);
  font-size: 0.72rem;
  padding: 0.3rem 0.65rem;
  border-radius: var(--radius-pill);
  font-weight: 500;
}
.list-card-body {
  padding: 1.1rem 1.25rem;
  display: flex; flex-direction: column;
  gap: 0.4rem;
}
.list-card-body .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
.list-card-body .loc { font-size: 0.82rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.list-card-body .rating { font-size: 0.85rem; display: flex; align-items: center; gap: 0.2rem; }
.list-card-body .rating svg { width: 12px; height: 12px; fill: var(--ink); }
.list-card-body .title { font-family: "Fraunces", serif; font-size: 1.2rem; letter-spacing: -0.01em; }
.list-card-body .meta { font-size: 0.85rem; color: var(--ink-soft); }
.list-card-body .price-row {
  margin-top: auto;
  padding-top: 0.75rem;
  display: flex; justify-content: space-between; align-items: baseline;
}
.list-card-body .price { font-size: 1.05rem; font-weight: 600; }
.list-card-body .per { color: var(--ink-mute); font-weight: 400; font-size: 0.85rem; }

@media (max-width: 720px) {
  .list-card { grid-template-columns: 1fr; }
  .list-card-img { aspect-ratio: 16/10; }
}

/* Map panel (faux map made of CSS) */
.results-map {
  position: sticky; top: 80px;
  height: calc(100vh - 100px);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, #E8E2D2 0%, #DDD3BF 100%);
}
.map-canvas {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(123, 44, 191, 0.06), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(255, 61, 138, 0.06), transparent 60%);
}
.map-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(26, 20, 38, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26, 20, 38, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.map-roads {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.5;
}
.map-pin {
  position: absolute;
  background: white;
  border: 1px solid var(--line);
  padding: 0.35rem 0.7rem;
  border-radius: var(--radius-pill);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  transition: all 200ms;
  box-shadow: var(--shadow-sm);
  z-index: 1;
}
.map-pin:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 2; }
.map-pin.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
  z-index: 3;
  transform: translate(-50%, -50%) scale(1.1);
}
.map-watermark {
  position: absolute;
  bottom: 8px; right: 8px;
  font-size: 0.7rem;
  color: rgba(26, 20, 38, 0.4);
  font-style: italic;
}

/* ───────── Listing detail page ───────── */
.detail-back {
  display: flex; align-items: center; gap: 0.45rem;
  font-size: 0.88rem;
  color: var(--ink-soft);
  margin-bottom: 1rem;
  cursor: pointer;
  font-weight: 500;
}
.detail-back:hover { color: var(--ink); }
.detail-back svg { width: 16px; height: 16px; }

.detail-header { margin-bottom: 1.25rem; }
.detail-header h1 { font-size: clamp(1.8rem, 3vw, 2.6rem); margin-bottom: 0.4rem; }
.detail-header .meta {
  display: flex; align-items: center; gap: 0.85rem;
  font-size: 0.92rem;
  color: var(--ink-soft);
  flex-wrap: wrap;
}
.detail-header .meta .dot { color: var(--ink-faint); }
.detail-header .meta strong { font-weight: 500; color: var(--ink); }

.detail-gallery {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0.5rem;
  height: 460px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 2rem;
}
.detail-gallery > div {
  background: linear-gradient(135deg, var(--paper-3), var(--paper-2));
  position: relative;
}
.detail-gallery > div:nth-child(1) { grid-row: 1 / 3; }
.gallery-tile {
  display: flex; align-items: center; justify-content: center;
  font-family: "Fraunces", serif;
  font-style: italic;
  color: rgba(26, 20, 38, 0.18);
  font-size: 1.2rem;
}
.gallery-tile.tinted-1 { background: linear-gradient(135deg, #FFE0EC, #F4DAEC); }
.gallery-tile.tinted-2 { background: linear-gradient(135deg, #E0E5FF, #DAEAEC); }
.gallery-tile.tinted-3 { background: linear-gradient(135deg, #FFF4E0, #F4ECD0); }
.gallery-tile.tinted-4 { background: linear-gradient(135deg, #E8E0FF, #D8D0EC); }
.gallery-tile.tinted-5 { background: linear-gradient(135deg, #FFE8E0, #F4D6CC); }

@media (max-width: 720px) {
  .detail-gallery { grid-template-columns: 1fr; grid-template-rows: 250px; height: auto; }
  .detail-gallery > div:nth-child(n+2) { display: none; }
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 3rem;
  align-items: start;
}
@media (max-width: 980px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-section {
  padding: 1.75rem 0;
  border-bottom: 1px solid var(--line);
}
.detail-section:first-child { padding-top: 0; }
.detail-section h2 {
  font-size: 1.4rem;
  margin-bottom: 1rem;
}
.host-row {
  display: flex; align-items: center; gap: 1rem;
}
.host-row .avatar { width: 56px; height: 56px; font-size: 1.3rem; }
.host-row .role { color: var(--ink-mute); font-size: 0.88rem; }

.amenity-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.85rem;
}
.amenity {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0;
  font-size: 0.95rem;
}
.amenity svg { width: 18px; height: 18px; flex: none; color: var(--ink-soft); }

/* Booking sidebar */
.book-card {
  position: sticky; top: 80px;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
}
.book-card .price-row { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 1rem; }
.book-card .price-row .price { font-size: 1.6rem; font-weight: 600; }
.book-card .price-row .per { color: var(--ink-mute); font-size: 0.92rem; }
.book-card .price-row .rating {
  margin-left: auto;
  display: flex; align-items: center; gap: 0.25rem;
  font-size: 0.88rem;
}
.book-card .price-row .rating svg { width: 12px; height: 12px; fill: var(--ink); }

.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 0.5rem;
  overflow: hidden;
}
.date-input {
  padding: 0.7rem 0.95rem;
  border: none;
  outline: none;
  background: transparent;
  font-size: 0.85rem;
}
.date-input + .date-input { border-left: 1px solid var(--line); }
.date-input label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.15rem;
}
.guests-input {
  width: 100%;
  padding: 0.7rem 0.95rem;
  border: 1px solid var(--line);
  border-radius: 12px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  background: white;
  cursor: pointer;
}
.guests-input label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.15rem;
}
.btn-primary {
  width: 100%;
  padding: 0.95rem;
  background: var(--gradient-brand);
  color: white;
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.95rem;
  transition: transform 180ms, box-shadow 180ms;
  box-shadow: 0 6px 18px -4px rgba(214, 51, 132, 0.45);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 26px -6px rgba(214, 51, 132, 0.6); }
.btn-secondary {
  width: 100%;
  padding: 0.95rem;
  background: white;
  border: 1px solid var(--line);
  color: var(--ink);
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.95rem;
  transition: border-color 180ms;
}
.btn-secondary:hover { border-color: var(--ink); }

.cost-row {
  display: flex; justify-content: space-between;
  font-size: 0.9rem;
  padding: 0.4rem 0;
  color: var(--ink-soft);
}
.cost-row.total {
  border-top: 1px solid var(--line);
  margin-top: 0.5rem;
  padding-top: 0.85rem;
  font-weight: 600;
  font-size: 1rem;
  color: var(--ink);
}
.cost-row .underline { text-decoration: underline; cursor: help; }

/* ───────── Modal ───────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26, 20, 38, 0.5);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  animation: fadeIn 200ms ease;
}
.modal {
  background: var(--paper);
  border-radius: var(--radius-lg);
  width: 100%;

const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function AppProvider({ children }) {
  const [route, setRoute] = useState({ name: "search" }); // {name, params}
  const [mode, setMode] = useState("guest"); // 'guest' | 'host'
  const [saved, setSaved] = useState(new Set([3]));
  const [trips, setTrips] = useState(INITIAL_TRIPS);
  const [threads, setThreads] = useState(INITIAL_THREADS);
  const [filters, setFilters] = useState({
    type: "all",
    priceMin: 50, priceMax: 600,
    instantBookOnly: false,
    superhostOnly: false,
    amenities: new Set(),
  });
  const [sort, setSort] = useState("relevance");
  const [hoveredId, setHoveredId] = useState(null);
  const [toast, setToast] = useState(null);
  const [membersOpen, setMembersOpen] = useState(false);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const navigate = (name, params) => {
    setRoute({ name, params });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const toggleSaved = (id) => {
    setSaved(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
    showToast(saved.has(id) ? "Removed from wishlist" : "Saved to wishlist");
  };

  const value = {
    route, navigate, mode, setMode,
    saved, toggleSaved,
    trips, setTrips,
    threads, setThreads,
    filters, setFilters,
    sort, setSort,
    hoveredId, setHoveredId,
    toast, showToast,
    membersOpen, setMembersOpen,
  };
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

function SearchPage() {
  const { filters, sort, setSort, hoveredId } = useApp();

  const filtered = useMemo(() => {
    let list = PROPERTIES.filter(p => {
      if (filters.type !== "all" && p.type !== filters.type) return false;
      if (p.price < filters.priceMin || p.price > filters.priceMax) return false;
      if (filters.instantBookOnly && !p.instantBook) return false;
      if (filters.superhostOnly && !p.superhost) return false;
      if (filters.amenities.size > 0) {
        for (const a of filters.amenities) {
          if (!p.amenities.includes(a)) return false;
        }
      }
      return true;
    });
    if (sort === "price-asc") list = [...list].sort((a, b) => a.price - b.price);
    else if (sort === "price-desc") list = [...list].sort((a, b) => b.price - a.price);
    else if (sort === "rating") list = [...list].sort((a, b) => b.rating - a.rating);
    return list;
  }, [filters, sort]);

  return (
    <div className="page page-wide" style={{ padding: "1.25rem 1.5rem" }}>
      <div className="results-layout">
        <FilterPanel />
        <div>
          <MembersBanner context="search" />
          <header className="results-header">
            <div>
              <h1>{filtered.length} {filtered.length === 1 ? "stay" : "stays"}</h1>
              <div className="sub">Featured destinations · Curated by Vaytoven</div>
            </div>
            <select value={sort} onChange={e => setSort(e.target.value)} aria-label="Sort">
              <option value="relevance">Sort: Relevance</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="rating">Top rated</option>
            </select>
          </header>
          <div className="results-list">
            {filtered.length === 0 ? (
              <div className="empty-state">
                <Icon.Search style={{ width: 48, height: 48, opacity: 0.3 }} />
                <strong>No stays match these filters</strong>
                <span>Try widening your price range or removing amenities.</span>
              </div>
            ) : filtered.map(p => (
              <ListCard key={p.id} p={p} isHighlighted={hoveredId === p.id} />
            ))}
          </div>
        </div>
        <MapPanel properties={filtered} />
      </div>
    </div>
  );
}

function DetailPage({ params }) {
  const { navigate, saved, toggleSaved } = useApp();
  const p = PROPERTIES.find(x => x.id === params.id);
  if (!p) return <div className="page">Listing not found.</div>;

  const isSaved = saved.has(p.id);
  const [bookingOpen, setBookingOpen] = useState(false);
  const [checkIn, setCheckIn] = useState("");
  const [checkOut, setCheckOut] = useState("");
  const [guests, setGuests] = useState(2);

  // Default dates: a week starting in 30 days
  useEffect(() => {
    const today = new Date();
    const ci = new Date(today.getTime() + 30 * 86400000);
    const co = new Date(ci.getTime() + 5 * 86400000);
    const fmt = d => d.toISOString().slice(0, 10);
    setCheckIn(fmt(ci));
    setCheckOut(fmt(co));
  }, []);

  const nights = useMemo(() => {
    if (!checkIn || !checkOut) return 0;
    const diff = (new Date(checkOut) - new Date(checkIn)) / 86400000;
    return Math.max(0, Math.round(diff));
  }, [checkIn, checkOut]);

  const cleaningFee = 75;
  const serviceFee = Math.round(p.price * nights * 0.14);
  const taxes = Math.round((p.price * nights + cleaningFee) * 0.085);
  const total = p.price * nights + cleaningFee + serviceFee + taxes;

  return (
    <div className="page">
      <button className="detail-back" onClick={() => navigate("search")}>
        <Icon.Back /> Back to search
      </button>

      <div className="detail-header">
        <h1>{p.title}</h1>
        <div className="meta">
          <span><Icon.Star style={{ width: 14, height: 14, fill: "var(--ink)", verticalAlign: "middle" }} /> <strong>{p.rating}</strong> · {p.reviews} reviews</span>
          {p.superhost && <><span className="dot">·</span><span>Superhost</span></>}
          <span className="dot">·</span>
          <span>{p.country}</span>
          <span style={{ marginLeft: "auto", display: "flex", gap: "0.5rem" }}>
            <button className="chip" onClick={() => toggleSaved(p.id)}>
              {isSaved ? "♥ Saved" : "♡ Save"}
            </button>
          </span>
        </div>
      </div>

      <div className="detail-gallery">
        <div className={`gallery-tile tinted-${p.tint}`}><span>{p.city}</span></div>
        <div className="gallery-tile tinted-2"><span>Living room</span></div>
        <div className="gallery-tile tinted-3"><span>Bedroom</span></div>
        <div className="gallery-tile tinted-4"><span>Kitchen</span></div>
        <div className="gallery-tile tinted-5"><span>{p.amenities[1] || "View"}</span></div>
      </div>

      <div className="detail-grid">
        <div>
          <section className="detail-section">
            <h2>Hosted by {p.host.name}</h2>
            <div className="host-row">
              <div className="avatar" style={{ width: 56, height: 56, fontSize: "1.3rem" }}>{p.host.initial}</div>
              <div>
                <div style={{ fontWeight: 500 }}>{p.host.isSuperhost && "★ Superhost · "}Joined {p.host.joinedYear}</div>
                <div className="role">Responds within an hour · Speaks English, Spanish</div>
              </div>
            </div>
          </section>

          <section className="detail-section">
            <h2>About this place</h2>
            <p style={{ color: "var(--ink-soft)" }}>{p.description}</p>
            <div style={{ display: "flex", gap: "1.5rem", marginTop: "1rem", flexWrap: "wrap" }}>
              <span style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}><Icon.Users style={{ width: 18, height: 18 }} /> {p.guests} guests</span>
              <span style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}><Icon.Bed style={{ width: 18, height: 18 }} /> {p.beds} {p.beds === 1 ? "bed" : "beds"}</span>
              <span style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}><Icon.Bath style={{ width: 18, height: 18 }} /> {p.baths} bath</span>
            </div>
          </section>

          <section className="detail-section">
            <h2>What's included</h2>
            <div className="amenity-grid">
              {p.amenities.map(a => {
                const Cmp = AMENITY_ICON[a] || Icon.Check;
                return (
                  <div className="amenity" key={a}>
                    <Cmp />
                    <span>{a}</span>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="detail-section">
            <h2>Trust & safety</h2>
            <div style={{ display: "flex", gap: "0.85rem", alignItems: "start" }}>
              <Icon.Shield style={{ width: 24, height: 24, color: "var(--brand-magenta)", flex: "none" }} />
              <div>
                <div style={{ fontWeight: 500, marginBottom: "0.3rem" }}>Verified host · $1M property protection</div>
                <p style={{ color: "var(--ink-soft)", margin: 0, fontSize: "0.95rem" }}>
                  Every host is ID-verified. Every booking includes guest trip protection. 24-hour human support, no chatbot loops.
                </p>
              </div>
            </div>
          </section>
        </div>

        <aside className="book-card">
          <div className="price-row">
            <span className="price">${p.price}</span>
            <span className="per">/ night</span>
            <span className="rating"><Icon.Star /> {p.rating}</span>
          </div>

          <div className="date-row">
            <div className="date-input">
              <label>Check-in</label>
              <input type="date" value={checkIn} onChange={e => setCheckIn(e.target.value)} />
            </div>
            <div className="date-input">
              <label>Check-out</label>
              <input type="date" value={checkOut} onChange={e => setCheckOut(e.target.value)} />
            </div>
          </div>

          <div className="guests-input">
            <label>Guests</label>
            <select value={guests} onChange={e => setGuests(+e.target.value)} style={{ border: "none", outline: "none", background: "transparent", padding: 0, cursor: "pointer" }}>
              {[1, 2, 3, 4, 5, 6, 7, 8].map(n => (
                <option key={n} value={n} disabled={n > p.guests}>{n} {n === 1 ? "guest" : "guests"}{n > p.guests ? " (max exceeded)" : ""}</option>
              ))}

          </div>

          <button className="btn-primary" onClick={() => setBookingOpen(true)} disabled={nights === 0}>
            {p.instantBook ? "Reserve" : "Request to book"}
          </button>
          <p style={{ fontSize: "0.78rem", color: "var(--ink-mute)", textAlign: "center", margin: "0.5rem 0 1rem" }}>
            You won't be charged yet
          </p>

          {nights > 0 && (
            <>
              <div className="cost-row">
                <span className="underline">${p.price} × {nights} nights</span>
                <span>${p.price * nights}</span>
              </div>
              <div className="cost-row">
                <span className="underline">Cleaning fee</span>
                <span>${cleaningFee}</span>
              </div>
              <div className="cost-row">
                <span className="underline">Vaytoven service fee</span>
                <span>${serviceFee}</span>
              </div>
              <div className="cost-row">
                <span className="underline">Taxes</span>
                <span>${taxes}</span>
              </div>
              <div className="cost-row total">
                <span>Total</span>
                <span>${total}</span>
              </div>
            </>
          )}
        </aside>
      </div>

      {bookingOpen && (
        <BookingModal
          p={p}
          checkIn={checkIn}
          checkOut={checkOut}
          guests={guests}
          nights={nights}
          total={total}
          onClose={() => setBookingOpen(false)}
        />
      )}
    </div>
  );
}

function BookingModal({ p, checkIn, checkOut, guests, nights, total, onClose }) {
  const { trips, setTrips, navigate, showToast } = useApp();
  const [step, setStep] = useState(1); // 1: review, 2: payment, 3: confirmed
  const [name, setName] = useState("");
  const [card, setCard] = useState("");

  const fmtDate = (s) => new Date(s).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  const code = useMemo(() => "VYT-" + Math.random().toString(36).slice(2, 8).toUpperCase(), []);

  const handleConfirm = () => {
    const newTrip = {
      id: "b" + Date.now(),
      propertyId: p.id,
      title: p.title,
      location: `${p.city}, ${p.country.split(",")[0]}`,
      checkIn: fmtDate(checkIn), checkOut: fmtDate(checkOut),
      nights, total,
      status: "confirmed",
      code,
      when: "upcoming",
    };
    setTrips([newTrip, ...trips]);
    setStep(3);
  };

  const handleDone = () => {
    onClose();
    showToast("Booking confirmed");
    navigate("trips");
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>{step === 3 ? "You're booked!" : step === 2 ? "Add payment" : "Confirm and pay"}</h2>
          {step !== 3 && (
            <button className="modal-close" onClick={onClose} aria-label="Close"><Icon.Close /></button>
          )}
        </div>

        <div className="modal-body">
          {step === 1 && (
            <>
              <div style={{ display: "flex", gap: "0.85rem", paddingBottom: "1.25rem", borderBottom: "1px solid var(--line)" }}>
                <div className={`gallery-tile tinted-${p.tint}`} style={{ width: 80, height: 80, borderRadius: 12, fontSize: "0.9rem", flex: "none" }}>
                  <span>{p.city}</span>
                </div>
                <div>
                  <div style={{ fontFamily: "Fraunces, serif", fontSize: "1.1rem", marginBottom: "0.2rem" }}>{p.title}</div>
                  <div style={{ fontSize: "0.85rem", color: "var(--ink-mute)" }}>{p.country} · Hosted by {p.host.name}</div>
                </div>
              </div>

              <div style={{ padding: "1.25rem 0", borderBottom: "1px solid var(--line)" }}>
                <h4 style={{ fontFamily: "Geist, sans-serif", fontSize: "0.8rem", textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--ink-mute)", marginBottom: "0.65rem" }}>Your trip</h4>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem" }}>
                  <div>
                    <div style={{ fontWeight: 500 }}>Dates</div>
                    <div style={{ fontSize: "0.88rem", color: "var(--ink-soft)" }}>{fmtDate(checkIn)} → {fmtDate(checkOut)}</div>
                  </div>
                  <div>
                    <div style={{ fontWeight: 500 }}>Guests</div>
                    <div style={{ fontSize: "0.88rem", color: "var(--ink-soft)" }}>{guests} {guests === 1 ? "guest" : "guests"}</div>
                  </div>
                </div>
              </div>

              <div style={{ padding: "1.25rem 0" }}>
                <h4 style={{ fontFamily: "Geist, sans-serif", fontSize: "0.8rem", textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--ink-mute)", marginBottom: "0.65rem" }}>Total cost</h4>
                <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "Fraunces, serif", fontSize: "1.6rem" }}>
                  <span>{nights} {nights === 1 ? "night" : "nights"}</span>
                  <span>${total}</span>
                </div>

              </div>
            </>
          )}

          {step === 2 && (
            <>
              <p style={{ marginBottom: "1.5rem", color: "var(--ink-soft)" }}>

                <div style={{ fontSize: "0.78rem", color: "var(--ink-mute)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "0.4rem" }}>Card number</div>
                <input
                  type="text"
                  value={card}
                  onChange={e => setCard(e.target.value.replace(/\D/g, "").slice(0, 16).replace(/(\d{4})(?=\d)/g, "$1 "))}
                  placeholder="4242 4242 4242 4242"
                  style={{ width: "100%", padding: "0.7rem 0.95rem", border: "1px solid var(--line)", borderRadius: 12, fontSize: "0.92rem", outline: "none", fontFeatureSettings: "'tnum'" }}

              <div style={{ background: "var(--paper-2)", padding: "1rem", borderRadius: 12, fontSize: "0.85rem", display: "flex", gap: "0.55rem", alignItems: "start" }}>

                  Your card is authorized today and charged when you check in. Cancel for free up to 5 days before your stay.

          {step === 3 && (
            <>
              <div className="confirm-hero" style={{ padding: "3rem 1.5rem", marginBottom: "1.5rem" }}>

                <p>Confirmation sent to your email and added to Trips.</p>

              </div>

                  <div style={{ fontSize: "0.74rem", textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--ink-mute)", marginBottom: "0.35rem" }}>Stay</div>
                  <div style={{ fontWeight: 500 }}>{p.title}</div>
                  <div style={{ fontSize: "0.88rem", color: "var(--ink-soft)" }}>{p.country}</div>
                </div>
                <div>
                  <div style={{ fontSize: "0.74rem", textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--ink-mute)", marginBottom: "0.35rem" }}>Total charged</div>
                  <div style={{ fontWeight: 500 }}>${total}</div>
                  <div style={{ fontSize: "0.88rem", color: "var(--ink-soft)" }}>{nights} nights · {guests} guests</div>
                </div>
              </div>
            </>
          )}
        </div>

        <div className="modal-footer">
          {step === 1 && (
            <>
              <button className="btn-secondary" onClick={onClose} style={{ flex: 1 }}>Cancel</button>
              <button className="btn-primary" onClick={() => setStep(2)} style={{ flex: 2 }}>Continue to payment</button>
            </>
          )}
          {step === 2 && (
            <>
              <button className="btn-secondary" onClick={() => setStep(1)} style={{ flex: 1 }}>Back</button>
              <button className="btn-primary" onClick={handleConfirm} style={{ flex: 2 }} disabled={!name}>
                Confirm and pay ${total}
              </button>
            </>
          )}
          {step === 3 && (
            <button className="btn-primary" onClick={handleDone}>View my trips</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// INBOX PAGE
// ═════════════════════════════════════════════════════════════════

function InboxPage() {
  const { threads, setThreads } = useApp();
  const [activeId, setActiveId] = useState(threads[0]?.id);
  const [draft, setDraft] = useState("");
  const messagesEnd = useRef();

  const active = threads.find(t => t.id === activeId);

  // Mark as read on selection
  useEffect(() => {
    if (active?.unread) {
      setThreads(ts => ts.map(t => t.id === active.id ? { ...t, unread: false } : t));
    }
  }, [activeId]);

  useEffect(() => {
    messagesEnd.current?.scrollIntoView({ behavior: "smooth" });
  }, [active?.messages?.length]);

  const send = () => {
    if (!draft.trim()) return;
    setThreads(ts => ts.map(t => t.id === activeId
      ? { ...t, messages: [...t.messages, { from: "me", text: draft.trim(), time: "now" }], lastTime: "now" }
      : t));
    setDraft("");
    // Simulate host reply after 2s
    setTimeout(() => {
      setThreads(ts => ts.map(t => t.id === activeId
        ? { ...t, messages: [...t.messages, { from: "them", text: "Thanks for reaching out — I'll get back to you shortly.", time: "now" }], lastTime: "now" }
        : t));
    }, 1800);
  };

  return (
    <div className="page page-wide" style={{ padding: "1rem 1.5rem" }}>
      <div className="inbox-layout">
        <div className="inbox-list">
          <div className="inbox-list-header">Messages</div>
          {threads.map(t => (
            <div
              key={t.id}
              className={`inbox-item ${t.id === activeId ? "active" : ""} ${t.unread ? "unread" : ""}`}
              onClick={() => setActiveId(t.id)}
            >
              <div className="avatar">{t.hostInitial}</div>
              <div className="info">
                <div className="row1">
                  <span className="name">{t.hostName}</span>
                  <span className="time">{t.lastTime}</span>
                </div>
                <div className="preview">{t.messages[t.messages.length - 1]?.text}</div>
                <div style={{ fontSize: "0.75rem", color: "var(--ink-mute)", marginTop: "0.2rem", fontStyle: "italic" }}>
                  {t.propertyTitle}
                </div>
              </div>
            </div>
          ))}
        </div>

        <div className="inbox-thread">
          {active ? (
            <>
              <div className="inbox-thread-header">
                <div className="avatar" style={{ width: 44, height: 44 }}>{active.hostInitial}</div>
                <div className="info">
                  <div className="name">{active.hostName}</div>
                  <div className="stay">{active.propertyTitle}</div>
                </div>
              </div>
              <div className="thread-messages">
                {active.messages.map((m, i) => (
                  <React.Fragment key={i}>
                    <div className={`msg ${m.from}`}>{m.text}</div>
                  </React.Fragment>
                ))}
                <div ref={messagesEnd} />
              </div>
              <div className="thread-composer">
                <textarea
                  rows={1}
                  placeholder="Type a message…"
                  value={draft}
                  onChange={e => setDraft(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                />
                <button onClick={send} disabled={!draft.trim()} aria-label="Send"><Icon.Send /></button>
              </div>
            </>
          ) : (
            <div className="empty-state">
              <Icon.Mail style={{ width: 48, height: 48, opacity: 0.3 }} />
              <strong>No conversations yet</strong>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function HostCalendar() {
  // Simple month grid showing booked / blocked / available days
  const today = new Date();
  const month = today.getMonth();
  const year = today.getFullYear();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = today.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  // Mock booked dates (deterministic)
  const booked = new Set([5, 6, 7, 8, 14, 15, 16, 22, 23]);
  const blocked = new Set([18, 19]);

  return (
    <div style={{ background: "white", padding: "2rem", borderRadius: "var(--radius)", border: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "1.5rem" }}>
        <h2 style={{ fontSize: "1.4rem" }}>{monthName}</h2>
        <div style={{ display: "flex", gap: "1.25rem", fontSize: "0.85rem" }}>
          <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "var(--brand-pink)", marginRight: 6, verticalAlign: "middle" }} /> Booked</span>
          <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "var(--ink-faint)", marginRight: 6, verticalAlign: "middle" }} /> Blocked</span>
          <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "var(--paper-2)", border: "1px solid var(--line)", marginRight: 6, verticalAlign: "middle" }} /> Available</span>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, fontSize: "0.78rem", color: "var(--ink-mute)", marginBottom: "0.5rem" }}>
        {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => <div key={d} style={{ textAlign: "center", padding: "0.5rem 0", fontWeight: 500 }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {Array.from({ length: firstDay }).map((_, i) => <div key={`pad${i}`} />)}
        {Array.from({ length: daysInMonth }).map((_, i) => {
          const d = i + 1;
          const isBooked = booked.has(d);
          const isBlocked = blocked.has(d);
          const isToday = d === today.getDate();
          return (
            <div
              key={d}
              style={{
                aspectRatio: 1,
                borderRadius: 8,
                background: isBooked ? "var(--brand-pink)" : isBlocked ? "var(--ink-faint)" : "var(--paper-2)",
                color: isBooked ? "white" : isBlocked ? "white" : "var(--ink)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "0.92rem",
                fontWeight: isToday ? 600 : 400,
                border: isToday ? "2px solid var(--brand-purple)" : "1px solid transparent",
                cursor: "pointer",
              }}
            >{d}</div>
          );
        })}
      </div>
    </div>
  );
}

function HostEarnings() {

function MembersBanner({ context = "search" }) {
  const { setMembersOpen } = useApp();
  const copy = context === "host"
    ? { title: "Own vacation property in a points program?", sub: "Earn from unused weeks — managed end-to-end." }
    : { title: "Own vacation property points?", sub: "Earn rental income on the weeks you don't use." };
  return (
    <div className="members-banner" onClick={() => setMembersOpen(true)} role="button" tabIndex={0}
         onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setMembersOpen(true); } }}>
      <div className="members-banner-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div className="members-banner-text">
        <strong>{copy.title}</strong>
        <span>{copy.sub}</span>
      </div>
      <svg className="members-banner-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  );
}

function MembersModal() {
  const { membersOpen, setMembersOpen, showToast } = useApp();
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({
    firstName: "", lastName: "", email: "", phone: "",
    program: "", property: "", points: "", bestTime: "", notes: "",
    consent: false,
  });
  const [error, setError] = useState("");

  if (!membersOpen) return null;

  const close = () => {
    setMembersOpen(false);
    // Reset after fade-out
    setTimeout(() => {
      setSubmitted(false);
      setForm({
        firstName: "", lastName: "", email: "", phone: "",
        program: "", property: "", points: "", bestTime: "", notes: "",
        consent: false,
      });
      setError("");
    }, 250);
  };

  const update = (k) => (e) => {
    const v = e.target.type === "checkbox" ? e.target.checked : e.target.value;
    setForm(prev => ({ ...prev, [k]: v }));
  };

  const submit = (e) => {
    e.preventDefault();
    // Required-field check
    const missing = [];
    if (!form.firstName.trim()) missing.push("First name");
    if (!form.lastName.trim()) missing.push("Last name");
    if (!form.email.trim()) missing.push("Email");
    if (!form.phone.trim()) missing.push("Phone");
    if (!form.program) missing.push("Program");
    if (!form.property.trim()) missing.push("Property");
    if (!form.consent) missing.push("Consent");
    if (missing.length) {
      setError(`Please complete: ${missing.join(", ")}.`);
      return;
    }
    // Basic email sanity
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
      setError("That email doesn't look right.");
      return;
    }
    setError("");
    // In production this would POST to an endpoint that fans out to CRM + Slack + email
    console.log("Members enquiry:", form);
    setSubmitted(true);
    showToast("Submitted — we'll be in touch within one business day.");
    setTimeout(close, 4500);
  };

  return (
    <div className="modal-overlay" onClick={close}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 560 }}>
        {!submitted ? (
          <>
            <div className="modal-header">
              <div>
                <div style={{ fontSize: "0.7rem", textTransform: "uppercase", letterSpacing: "0.16em", color: "var(--ink-mute)", marginBottom: "0.3rem" }}>
                  Managed listing program
                </div>
                <h2>Tell us about your vacation property.</h2>
              </div>
              <button className="modal-close" onClick={close} aria-label="Close"><Icon.Close /></button>
            </div>

            <div className="modal-body">
              <p style={{ color: "var(--ink-soft)", fontSize: "0.92rem", marginBottom: "1.25rem", lineHeight: 1.5 }}>
                A member specialist will reach out within one business day to walk through how the program works for your specific portfolio.
              </p>

              <form className="mform" onSubmit={submit} noValidate>
                {error && <div className="mform-error">{error}</div>}

                <div className="mform-row">
                  <div className="mfield">
                    <label>First name <span className="req">*</span></label>
                    <input type="text" value={form.firstName} onChange={update("firstName")} autoComplete="given-name" />
                  </div>
                  <div className="mfield">
                    <label>Last name <span className="req">*</span></label>
                    <input type="text" value={form.lastName} onChange={update("lastName")} autoComplete="family-name" />
                  </div>
                </div>

                <div className="mform-row">
                  <div className="mfield">
                    <label>Email <span className="req">*</span></label>
                    <input type="email" value={form.email} onChange={update("email")} autoComplete="email" />
                  </div>
                  <div className="mfield">
                    <label>Phone <span className="req">*</span></label>
                    <input type="tel" value={form.phone} onChange={update("phone")} autoComplete="tel" />
                  </div>
                </div>

                <div className="mfield">
                  <label>Vacation club / program <span className="req">*</span></label>
                  <select value={form.program} onChange={update("program")}>
                    <option value="">Select a program</option>
                    <option>Marriott Vacation Club</option>
                    <option>Hilton Grand Vacations</option>
                    <option>Disney Vacation Club</option>
                    <option>Wyndham Destinations</option>
                    <option>Hyatt Residence Club</option>
                    <option>Diamond Resorts</option>
                    <option>Worldmark by Wyndham</option>
                    <option>Bluegreen Vacations</option>
                    <option>Westgate</option>
                    <option>RCI Points</option>
                    <option>Interval International</option>
                    <option>Other / Independent</option>
                  </select>
                </div>

                <div className="mfield">
                  <label>Property name &amp; location <span className="req">*</span></label>
                  <input type="text" value={form.property} onChange={update("property")} placeholder="e.g. Marriott Maui Ocean Club, Lahaina HI" />
                  <span className="hint">If you have multiple, list one — we'll discuss the rest on the call.</span>
                </div>

                <div className="mform-row">
                  <div className="mfield">
                    <label>Annual points balance</label>
                    <input type="text" value={form.points} onChange={update("points")} placeholder="e.g. 250,000" />
                  </div>
                  <div className="mfield">
                    <label>Best time to call</label>
                    <select value={form.bestTime} onChange={update("bestTime")}>
                      <option value="">No preference</option>
                      <option>Morning (8am – 12pm)</option>
                      <option>Afternoon (12pm – 5pm)</option>
                      <option>Evening (5pm – 8pm)</option>
                      <option>Weekends only</option>
                    </select>
                  </div>
                </div>

                <div className="mfield">
                  <label>Anything we should know?</label>
                  <textarea value={form.notes} onChange={update("notes")} placeholder="Banking restrictions, blackout weeks, multiple memberships, etc." />
                </div>

                <label className="mcheckbox">
                  <input type="checkbox" checked={form.consent} onChange={update("consent")} />
                  <span>I'd like to be contacted about Vaytoven's managed listing program. I understand my information will be reviewed by a member specialist.</span>
                </label>

                <button type="submit" className="btn-primary" style={{ marginTop: "0.4rem", justifyContent: "center" }}>
                  Submit and schedule a call
                </button>
              </form>
            </div>
          </>
        ) : (
          <div className="members-success">
            <div className="check">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <h3>Thanks — we got it.</h3>
            <p>A member specialist will reach out within one business day. In the meantime, watch your inbox for a confirmation email.</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// ROUTER + APP ROOT
// ═════════════════════════════════════════════════════════════════

function Router() {
  const { route } = useApp();
  switch (route.name) {
    case "search": return <SearchPage />;
    case "detail": return <DetailPage params={route.params} />;
    case "trips":  return <TripsPage />;
    case "inbox":  return <InboxPage />;
    case "host":   return <HostPage />;
    default:       return <SearchPage />;
  }
}

function App() {
  return (
    <AppProvider>
      <div className="app">
        <Topbar />
        <main className="main">
          <Router />
        </main>
        <Toast />
        <MembersModal />
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
